spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/petc}
    username: ${DB_USER:petc}
    password: ${DB_PASS:petc}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

petc:
  jwt:
    secret: ${JWT_SECRET:changeme-at-least-32-chars-long!!!}
    access-token-expiry-minutes: 15
    refresh-token-expiry-days: 30
  s3:
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    bucket: ${S3_BUCKET:petc-photos}
    region: ${S3_REGION:ap-southeast-1}
    access-key: ${S3_ACCESS_KEY:minioadmin}
    secret-key: ${S3_SECRET_KEY:minioadmin}
  gov:
    mock: ${GOV_MOCK:true}   # flip to false once real sandbox creds arrive

logging:
  level:
    com.petc: DEBUG
    org.flywaydb: INFO

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/petc}
    username: ${DB_USER:petc}
    password: ${DB_PASS:petc}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

petc:
  jwt:
    secret: ${JWT_SECRET:dev-secret-must-be-at-least-32-chars!}
    access-token-minutes: 60
    refresh-token-days: 30
  updates:
    stable-version: ${STABLE_VERSION:0.1.0}
    stable-url: ${STABLE_BASE_URL:https://releases.example.com/petc}
  ingest:
    dev-key-enabled: ${DEV_CENTER_KEY_ENABLED:true}
    dev-key: ${DEV_CENTER_KEY:dev-insecure-key}
    dev-tenant-slug: ${DEV_CENTER_SLUG:dev-center}
    dev-tenant-name: ${DEV_CENTER_NAME:Mock PETC Center}

logging:
  level:
    com.petc: DEBUG
    org.springframework.security: INFO
